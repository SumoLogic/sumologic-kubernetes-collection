name: Close stale issues and pull requests

on:
  workflow_dispatch:
    inputs:
      debug-only:
        description: "Do you want to run the workflow in debug mode?"
        default: true
        required: true
        type: boolean
  schedule:
    - cron: "0 5 * * *"

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v10
        with:
          # Pull Request configuration
          stale-pr-message: >-
            This PR is stale because it has been open for 60 days with no activity. Remove stale label or comment or this will be closed in
            7 days.
          close-pr-message: "This PR is being closed because it has been stale for 7 days with no activity."
          days-before-pr-stale: 60
          days-before-pr-close: 7
          stale-pr-label: "stale"

          # Issue configuration
          stale-issue-message: >-
            This issue is stale because it has been open for 90 days with no activity. Remove stale label or comment or this will be closed
            in 14 days.
          close-issue-message: "This issue is being closed because it has been stale for 14 days with no activity."
          days-before-issue-stale: 90
          days-before-issue-close: 14
          stale-issue-label: "stale"

          # General configuration
          exempt-issue-labels: "pinned,security,roadmap"
          exempt-pr-labels: "pinned,security,roadmap"
          operations-per-run: 100
          remove-stale-when-updated: true
          debug-only: ${{ github.event.inputs['debug-only'] || false }}
