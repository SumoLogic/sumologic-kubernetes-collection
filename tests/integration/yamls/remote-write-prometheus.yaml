---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-remote-write
  namespace: remote-write-test
  labels:
    app: prometheus-remote-write
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-remote-write
  template:
    metadata:
      labels:
        app: prometheus-remote-write
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--web.listen-address=:9090"
            - "--storage.tsdb.retention.time=1h"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-remote-write-config
