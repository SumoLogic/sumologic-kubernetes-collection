sumologic:
  metrics:
    enabled: false
  traces:
    enabled: false
  events:
    enabled: false
  logs:
    otelcol:
      extraExporters:
        sumologic/additional-sumologic-mock:
          endpoint: http://additional-sumologic-mock:3000/receiver
      routing:
        table:
          - context: resource
            condition: attributes["deployment"] == "logs-generator"
            exporter: sumologic/additional-sumologic-mock
