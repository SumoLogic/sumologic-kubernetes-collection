version: "2"

run:
  timeout: 10m

linters:
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: true

    lll:
      line-length: 185
      tab-width: 8

  default: none
  enable:
    - errcheck
    - misspell
    - lll
    - govet
    - ineffassign
    - unused
    - staticcheck

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
