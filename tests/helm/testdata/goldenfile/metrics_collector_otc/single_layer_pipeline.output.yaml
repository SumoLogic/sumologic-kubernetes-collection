---
# Source: sumologic/templates/metrics/collector/otelcol/opentelemetrycollector.yaml
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: RELEASE-NAME-sumologic-metrics
  namespace: sumologic
  labels:
    sumologic.com/app: otelcol
    sumologic.com/component: metrics
    chart: "sumologic-%CURRENT_CHART_VERSION%"
    release: "RELEASE-NAME"
    heritage: "Helm"
    sumologic.com/scrape: "true"
spec:
  image: "public.ecr.aws/sumologic/sumologic-otel-collector:0.154.0-sumo-0"
  mode: statefulset
  replicas: 1
  serviceAccount: RELEASE-NAME-sumologic-metrics
  managementState: managed
  upgradeStrategy: automatic
  targetAllocator:
    enabled: true
    filterStrategy: relabel-config
    prometheusCR:
      enabled: true
      scrapeInterval: 30s
      serviceMonitorSelector:
        matchLabels:
          release: RELEASE-NAME
      podMonitorSelector:
        matchLabels:
          release: RELEASE-NAME
    serviceAccount: RELEASE-NAME-sumologic-metrics-targetallocator-sa
    nodeSelector:
      kubernetes.io/os: linux
    resources: {}
  nodeSelector:
    kubernetes.io/os: linux
  autoscaler:
    maxReplicas: 10
    minReplicas: 3
    targetCPUUtilization: 70
    targetMemoryUtilization: 70
  env:
    - name: SUMO_ENDPOINT_APISERVER_METRICS_SOURCE
      valueFrom:
        secretKeyRef:
          name: sumologic
          key: endpoint-metrics-apiserver
    - name: SUMO_ENDPOINT_CONTROL_PLANE_METRICS_SOURCE
      valueFrom:
        secretKeyRef:
          name: sumologic
          key: endpoint-control_plane_metrics_source
    - name: SUMO_ENDPOINT_CONTROLLER_METRICS_SOURCE
      valueFrom:
        secretKeyRef:
          name: sumologic
          key: endpoint-metrics-kube-controller-manager
    - name: SUMO_ENDPOINT_DEFAULT_METRICS_SOURCE
      valueFrom:
        secretKeyRef:
          name: sumologic
          key: endpoint-metrics
    - name: SUMO_ENDPOINT_DEFAULT_OTLP_METRICS_SOURCE
      valueFrom:
        secretKeyRef:
          name: sumologic
          key: endpoint-metrics-otlp
    - name: SUMO_ENDPOINT_KUBELET_METRICS_SOURCE
      valueFrom:
        secretKeyRef:
          name: sumologic
          key: endpoint-metrics-kubelet
    - name: SUMO_ENDPOINT_NODE_METRICS_SOURCE
      valueFrom:
        secretKeyRef:
          name: sumologic
          key: endpoint-metrics-node-exporter
    - name: SUMO_ENDPOINT_SCHEDULER_METRICS_SOURCE
      valueFrom:
        secretKeyRef:
          name: sumologic
          key: endpoint-metrics-kube-scheduler
    - name: SUMO_ENDPOINT_STATE_METRICS_SOURCE
      valueFrom:
        secretKeyRef:
          name: sumologic
          key: endpoint-metrics-kube-state

    - name: NO_PROXY
      value: kubernetes.default.svc
    - name: NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace
    - name: MY_POD_IP
      valueFrom:
        fieldRef:
          apiVersion: v1
          fieldPath: status.podIP
  podAnnotations:
    ## The operator adds this annotation by default, but we use our own ServiceMonitor
    prometheus.io/scrape: "false"
  podSecurityContext:
    fsGroup: 999
  ports:
    - name: pprof
      port: 1777
    - name: metrics-rw
      port: 9888
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 100m
      memory: 768Mi
  volumes:
    - name: tmp
      emptyDir: {}
  volumeMounts:
    - name: tmp
      mountPath: /tmp
    - name: file-storage
      mountPath: /var/lib/storage/otc
  volumeClaimTemplates:
    - metadata:
        name: file-storage
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 10Gi
  config:
    connectors:
      forward: {}
    exporters:
      sumologic/default:
        client: k8s_%CURRENT_CHART_VERSION%
        decompose_otlp_histograms: true
        decompose_otlp_summaries: true
        endpoint: ${SUMO_ENDPOINT_DEFAULT_OTLP_METRICS_SOURCE}
        max_request_body_size: 16777216
        metric_format: otlp
        sending_queue:
          batch:
            flush_timeout: 1s
            max_size: 2048
            min_size: 1024
          enabled: true
          num_consumers: 10
          queue_size: 10240000
          storage: file_storage
        timeout: 30s
    extensions:
      file_storage:
        compaction:
          directory: /tmp
          on_rebound: true
        directory: /var/lib/storage/otc
        timeout: 10s
      health_check:
        endpoint: ${env:MY_POD_IP}:13133
      pprof: {}
    processors:
      batch:
        send_batch_max_size: 2048
        send_batch_size: 1024
        timeout: 1s
      filter/drop_stale_datapoints:
        metrics:
          datapoint:
            - flags == FLAG_NO_RECORDED_VALUE
      filter/drop_unnecessary_metrics:
        error_mode: ignore
        metrics:
          metric:
            - resource.attributes["job"] != "pod-annotations" and IsMatch(name, "scrape_.*")
            - (not IsMatch(name, "^$")) and (type == METRIC_DATA_TYPE_HISTOGRAM or type == METRIC_DATA_TYPE_EXPONENTIAL_HISTOGRAM or type ==
              METRIC_DATA_TYPE_SUMMARY or IsMatch(name, ".*_bucket"))
            - IsMatch(name,
              "^otelcol[._](k8s[._]pod[._]association|otelsvc_k8s_(pod_added|pod_updated|pod_table_size|pod_deleted|ip_lookup_miss))$")
            - IsMatch(name, "^otelcol[._].*k8s.*")
      groupbyattrs:
        keys:
          - container
          - namespace
          - pod
          - service
      groupbyattrs/group_by_name:
        keys:
          - __name__
          - job
      k8sattributes:
        auth_type: serviceAccount
        extract:
          labels:
            - from: pod
              key_regex: (.*)
              tag_name: pod_labels_$$1
          metadata:
            - k8s.pod.name
            - k8s.deployment.name
            - k8s.daemonset.name
            - k8s.replicaset.name
            - k8s.statefulset.name
            - k8s.namespace.name
            - k8s.node.name
            - service.name
            - service.namespace
        passthrough: false
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.name
              - from: resource_attribute
                name: k8s.namespace.name
        wait_for_metadata: true
        wait_for_metadata_timeout: 10s
      memory_limiter:
        check_interval: 5s
        limit_percentage: 90
        spike_limit_percentage: 20
      metricstransform:
        transforms:
          - action: update
            include: ^prometheus_remote_write_(.*)$$
            match_type: regexp
            new_name: $$1
      resource:
        attributes:
          - action: upsert
            from_attribute: namespace
            key: k8s.namespace.name
          - action: delete
            key: namespace
          - action: upsert
            from_attribute: pod
            key: k8s.pod.name
          - action: delete
            key: pod
          - action: upsert
            from_attribute: container
            key: k8s.container.name
          - action: delete
            key: container
          - action: upsert
            from_attribute: node
            key: k8s.node.name
          - action: delete
            key: node
          - action: upsert
            from_attribute: service
            key: prometheus_service
          - action: delete
            key: service
          - action: upsert
            from_attribute: service.name
            key: job
          - action: delete
            key: service.name
          - action: upsert
            key: _origin
            value: kubernetes
          - action: upsert
            key: cluster
            value: kubernetes
      resource/delete_source_metadata:
        attributes:
          - action: delete
            key: _sourceCategory
          - action: delete
            key: _sourceHost
          - action: delete
            key: _sourceName
      resource/remove_k8s_pod_pod_name:
        attributes:
          - action: delete
            key: k8s.pod.pod_name
      source:
        collector: kubernetes
        exclude:
          k8s.namespace.name: ""
      sumologic:
        add_cloud_namespace: false
      transform/drop_unnecessary_attributes:
        error_mode: ignore
        metric_statements:
          - context: resource
            statements:
              - delete_key(attributes, "http.scheme")
              - delete_key(attributes, "net.host.name")
              - delete_key(attributes, "net.host.port")
              - delete_key(attributes, "service.instance.id")
              - delete_matching_keys(attributes, "k8s.*")
      transform/extract_sum_count_from_histograms:
        error_mode: ignore
        metric_statements:
          - context: metric
            statements:
              - extract_sum_metric(true) where (not IsMatch(name, "^$")) and (type == METRIC_DATA_TYPE_HISTOGRAM or type ==
                METRIC_DATA_TYPE_EXPONENTIAL_HISTOGRAM or type == METRIC_DATA_TYPE_SUMMARY)
              - extract_count_metric(true) where (not IsMatch(name, "^$")) and (type == METRIC_DATA_TYPE_HISTOGRAM or type ==
                METRIC_DATA_TYPE_EXPONENTIAL_HISTOGRAM or type == METRIC_DATA_TYPE_SUMMARY)
      transform/remove_name:
        error_mode: ignore
        metric_statements:
          - context: resource
            statements:
              - delete_key(attributes, "__name__")
      transform/set_name:
        error_mode: ignore
        metric_statements:
          - context: datapoint
            statements:
              - set(attributes["__name__"], metric.name) where IsMatch(metric.name, "^cloudprovider_.*")
    receivers:
      prometheus:
        config:
          global:
            scrape_interval: 30s
          scrape_configs:
            - job_name: pod-annotations
              kubernetes_sd_configs:
                - role: pod
              relabel_configs:
                - action: keep
                  regex: true
                  source_labels:
                    - __meta_kubernetes_pod_annotation_prometheus_io_scrape
                - action: replace
                  regex: (.+)
                  source_labels:
                    - __meta_kubernetes_pod_annotation_prometheus_io_path
                  target_label: __metrics_path__
                - action: replace
                  regex: ([^:]+)(?::\d+)?;(\d+)
                  replacement: $1:$2
                  source_labels:
                    - __address__
                    - __meta_kubernetes_pod_annotation_prometheus_io_port
                  target_label: __address__
                - action: replace
                  regex: (.*)
                  replacement: $1
                  separator: ;
                  source_labels:
                    - __metrics_path__
                  target_label: endpoint
                - action: replace
                  source_labels:
                    - __meta_kubernetes_namespace
                  target_label: namespace
                - action: labelmap
                  regex: __meta_kubernetes_pod_label_(.+)
                - action: replace
                  regex: (.*)
                  replacement: $1
                  separator: ;
                  source_labels:
                    - __meta_kubernetes_pod_name
                  target_label: pod
            - authorization:
                credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              honor_labels: true
              job_name: kubelet
              kubernetes_sd_configs:
                - role: node
              metric_relabel_configs:
                - action: keep
                  regex: (?:kubelet_docker_operations_errors(?:|_total)|kubelet_(?:docker|runtime)_operations_duration_seconds_(?:count|sum)|kubelet_running_(?:container|pod)(?:_count|s)|kubelet_(:?docker|runtime)_operations_latency_microseconds(?:|_count|_sum))
                  source_labels:
                    - __name__
                - action: labeldrop
                  regex: id
              relabel_configs:
                - source_labels:
                    - __meta_kubernetes_node_name
                  target_label: node
                - replacement: https-metrics
                  target_label: endpoint
                - action: replace
                  source_labels:
                    - __metrics_path__
                  target_label: metrics_path
                - action: replace
                  source_labels:
                    - __address__
                  target_label: instance
              scheme: https
              tls_config:
                ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                insecure_skip_verify: true
            - authorization:
                credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              honor_labels: true
              job_name: cadvisor
              kubernetes_sd_configs:
                - role: node
              metric_relabel_configs:
                - action: replace
                  regex: .*
                  replacement: kubelet
                  source_labels:
                    - __name__
                  target_label: job
                - action: keep
                  regex: (?:container_cpu_usage_seconds_total|container_memory_working_set_bytes|container_fs_usage_bytes|container_fs_limit_bytes|container_cpu_cfs_throttled_seconds_total|container_network_receive_bytes_total|container_network_transmit_bytes_total)
                  source_labels:
                    - __name__
                - action: drop
                  regex: (?:container_cpu_usage_seconds_total|container_memory_working_set_bytes|container_fs_usage_bytes|container_fs_limit_bytes);$
                  source_labels:
                    - __name__
                    - container
                - action: labelmap
                  regex: container_name
                  replacement: container
                - action: drop
                  regex: POD
                  source_labels:
                    - container
                - action: labeldrop
                  regex: (id|name)
              metrics_path: /metrics/cadvisor
              relabel_configs:
                - replacement: https-metrics
                  target_label: endpoint
                - action: replace
                  source_labels:
                    - __metrics_path__
                  target_label: metrics_path
                - action: replace
                  source_labels:
                    - __address__
                  target_label: instance
              scheme: https
              tls_config:
                ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                insecure_skip_verify: true
      prometheusremotewrite:
        endpoint: ${env:MY_POD_IP}:9888
        read_timeout: 1m
        write_timeout: 1m
    service:
      extensions:
        - health_check
        - pprof
        - file_storage
      pipelines:
        metrics:
          exporters:
            - sumologic/default
          processors:
            - memory_limiter
            - metricstransform
            - groupbyattrs
            - resource
            - k8sattributes
            - source
            - sumologic
            - resource/remove_k8s_pod_pod_name
            - resource/delete_source_metadata
            - transform/set_name
            - groupbyattrs/group_by_name
            - transform/remove_name
            - filter/drop_unnecessary_metrics
          receivers:
            - forward
            - prometheusremotewrite
        metrics/collector:
          exporters:
            - forward
          processors:
            - filter/drop_stale_datapoints
            - transform/extract_sum_count_from_histograms
            - transform/drop_unnecessary_attributes
          receivers:
            - prometheus
      telemetry:
        logs:
          level: info
        metrics:
          level: normal
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: ${env:MY_POD_IP}
                    port: 8888
                    without_scope_info: true
                    without_type_suffix: true
                    without_units: true
