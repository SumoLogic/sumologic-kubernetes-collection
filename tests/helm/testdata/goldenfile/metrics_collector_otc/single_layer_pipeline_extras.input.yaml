sumologic:
  useExporterBatching: true
  metrics:
    collector:
      otelcol:
        singleLayerPipeline:
          enabled: true
metadata:
  metrics:
    statefulset:
      extraEnvVars:
        - name: MY_CUSTOM_KEY
          value: secret123
      extraVolumes:
        - name: custom-certs
          secret:
            secretName: my-tls-secret
      extraVolumeMounts:
        - name: custom-certs
          mountPath: /etc/ssl/custom
