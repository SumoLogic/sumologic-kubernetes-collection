sumologic:
  logs:
    collector:
      otelcol:
        enabled: true
    otelcol:
      extraExporters:
        sumologic/test:
          endpoint: https://test-endpoint
        debug:
          verbosity: detailed
      useDefaultExporters: true
      routing:
        table:
          - exporter: sumologic/test
            context: resource
            condition: attributes["exporter"] == "test"
