version: "2"

run:
  timeout: 10m

linters:
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: true

    lll:
      line-length: 185
      tab-width: 8

  disable-all: false
  disable:
    - prealloc
    - gosimple
  enable:
    - unused
    - errcheck
    - misspell
    - lll

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
