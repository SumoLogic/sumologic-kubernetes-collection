exporters:
  sumologic:
    client: {{ include "sumologic.sumo_client" . }}
    endpoint: {{ include "sumologic.events.exporter.endpoint" . }}
    log_format: {{ include "sumologic.events.exporter.format" . }}
    sending_queue:
      enabled: true
{{- if .Values.sumologic.events.persistence.enabled }}
      storage: file_storage
{{- end }}
      batch:
        flush_timeout: 1s
        min_size: 1_024
        max_size: 2_048

{{- if eq .Values.debug.events.print true }}
  debug:
    verbosity: detailed
    sending_queue:
      enabled: true
      batch:
        flush_timeout: 1s
        min_size: 1_024
        max_size: 2_048
{{- end }}

{{- if eq (include "sumologic-mock.forward-events" .) "true" }}
  sumologic/sumologic-mock:
    client: {{ include "sumologic.sumo_client" . }}
    endpoint: {{ include "sumologic-mock.receiver-endpoint" . }}
    log_format: {{ include "sumologic.events.exporter.format" . }}
    sending_queue:
      enabled: true
      batch:
        flush_timeout: 1s
        min_size: 1_024
        max_size: 2_048
{{- end }}

extensions:
{{- if .Values.sumologic.events.persistence.enabled }}
  file_storage:
    directory: {{ .Values.sumologic.events.persistence.persistentVolume.path }}
    timeout: 10s
{{- end }}
  health_check:
    endpoint: {{ template "sumologic.healthEndpoint" . }}
  pprof: {}

processors:
  resource/add_cluster:
    attributes:
      - action: upsert
        key: cluster
        value: {{ .Values.sumologic.clusterName | quote }}
  source:
    collector: {{ .Values.sumologic.collectorName | default .Values.sumologic.clusterName | quote }}
    source_category: {{ .Values.sumologic.events.sourceCategory | default (printf "%s/%s"  (include "sumologic.clusterNameReplaceSpaceWithDash" .) (.Values.sumologic.events.sourceName )) | quote}}
    source_category_prefix: ""
    source_category_replace_dash: {{ .Values.sumologic.events.sourceCategoryReplaceDash | quote}}
    source_name: {{ .Values.sumologic.events.sourceName | quote}}
  sumologic:
    add_cloud_namespace: false

  ## Add timestamp to attributes
  transform/add_timestamp:
    log_statements:
      - context: log
        statements:
          - set(time, Now()) where time_unix_nano == 0
          - set(attributes["timestamp"], Int(time_unix_nano / 1000000))

{{- if not .Values.otelevents.useSumoK8sEventReceiver }}
  ## Reformat body to align k8sobjects payload format with the older raw_k8s_events format
  ## so that existing event queries continue to work
  transform/reformat_body:
    log_statements:
      - context: log
        statements:
          # Copy 'object' from body to attributes
          - set(attributes["object"], body["object"])
          # Copy 'type' from body to attributes
          - set(attributes["type"], body["type"])
          # Lift 'message' out of 'object' and put it in 'body'
          - set(body, attributes["object"]["message"])

  ## Drop DELETED and other non-watch events (keep only ADDED and MODIFIED)
  filter/watch_types:
    logs:
      log_record:
        - attributes["type"] != "ADDED" and attributes["type"] != "MODIFIED"

  ## Populate severity_text and severity_number from the event type field
  transform/set_severity:
    log_statements:
      - context: log
        statements:
          # Warning → WARN (13)
          - set(severity_text, "Warning") where attributes["object"]["type"] == "Warning"
          - set(severity_number, 13) where attributes["object"]["type"] == "Warning"
          # Normal → INFO (9)
          - set(severity_text, "Normal") where attributes["object"]["type"] == "Normal"
          - set(severity_number, 9) where attributes["object"]["type"] == "Normal"
{{- end }}

{{- if .Values.otelevents.reportConfigMaps }}
  ## Extract configmap name and chart label from body
  transform/extract_configmap_name:
    log_statements:
      - context: log
        statements:
          - set(attributes["configmap_name"], body["metadata"]["name"]) where body["metadata"]["name"] != nil
          - set(attributes["chart"], body["metadata"]["labels"]["chart"]) where body["metadata"]["labels"]["chart"] != nil

  ## Filter to only include configmaps with chart label starting with "sumologic"
  filter/sumologic_configmaps:
    logs:
      include:
        match_type: regexp
        record_attributes:
          - key: chart
            value: ^sumologic.*
{{- end }}

receivers:
{{- if .Values.otelevents.reportConfigMaps }}
  k8sobjects/configmaps:
    auth_type: serviceAccount
    objects:
      - name: configmaps
        # Only pull sumologic configmaps every day
        namespaces:
          - {{ .Release.Namespace | quote }}
        mode: pull
        interval: 24h
{{- end }}
{{- if .Values.otelevents.useSumoK8sEventReceiver }}
  raw_k8s_events: {}
{{- else }}
  k8sobjects/events:
    auth_type: serviceAccount
    objects:
      - name: events
        mode: watch
{{- end }}

service:
  extensions:
    - health_check
{{- if .Values.sumologic.events.persistence.enabled }}
    - file_storage
{{- end }}
    - pprof
  pipelines:
{{- if .Values.otelevents.reportConfigMaps }}
    logs/configmaps:
      exporters:
        - sumologic
{{- if eq .Values.debug.events.print true }}
        - debug
{{- end }}
{{- if eq (include "sumologic-mock.forward-events" .) "true" }}
        - sumologic/sumologic-mock
{{- end }}
      processors:
        - transform/extract_configmap_name
        - filter/sumologic_configmaps
        - resource/add_cluster
        - source
        - sumologic
        - transform/add_timestamp
      receivers:
        - k8sobjects/configmaps
{{- end }}
    logs/events:
      exporters:
        - sumologic
{{- if eq .Values.debug.events.print true }}
        - debug
{{- end }}
{{- if eq (include "sumologic-mock.forward-events" .) "true" }}
        - sumologic/sumologic-mock
{{- end }}
      processors:
{{- if not .Values.otelevents.useSumoK8sEventReceiver }}
        - transform/reformat_body
        - filter/watch_types
        - transform/set_severity
{{- end }}
        - resource/add_cluster
        - source
        - sumologic
        - transform/add_timestamp
      receivers:
{{- if .Values.otelevents.useSumoK8sEventReceiver }}
        - raw_k8s_events
{{- else }}
        - k8sobjects/events
{{- end }}


  telemetry:
    logs:
      level: {{ .Values.otelevents.logLevel }}
    metrics:
      level: {{ .Values.otelevents.metricsLevel }}
      readers:
        - pull:
            exporter:
              prometheus:
                host: ${env:MY_POD_IP}
                port: 8888
                without_type_suffix: true
                without_units: true
                without_scope_info: true
