{{- $collectorConfig := .Values.sumologic.metrics.collector.otelcol -}}
{{- $scrapeConfigsPresent := or $collectorConfig.kubelet.enabled $collectorConfig.cAdvisor.enabled $collectorConfig.annotatedPods.enabled -}}
{{- if not .Values.sumologic.metrics.collector.otelcol.singleLayerPipeline.enabled }}
exporters:
{{- if eq .Values.debug.metrics.collector.print true }}
  debug:
    verbosity: detailed
{{- end }}
  otlphttp:
    endpoint: http://${METADATA_METRICS_SVC}.${NAMESPACE}.svc.{{ .Values.sumologic.clusterDNSDomain }}.:4318
    sending_queue:
      num_consumers: 10
      storage: file_storage
{{- if eq .Values.sumologic.useExporterBatching true }}
      queue_size: 10000000
      batch:
        flush_timeout: 1s
        min_size: 1000
        max_size: 2000
{{ else }}
      queue_size: 10000
{{- end }}
    # this improves load balancing at the cost of more network traffic
    disable_keep_alives: true

extensions:
  health_check:
    endpoint: {{ template "sumologic.healthEndpoint" . }}
  pprof: {}
  file_storage:
    directory: /var/lib/storage/otc
    timeout: 10s
    compaction:
      on_rebound: true
      directory: /tmp


processors:
  batch:
    send_batch_max_size: 2000
    send_batch_size: 1000
    timeout: 1s

  # staleness markers may simply indicate targets being moved between collector Pods, so they do more harm than good
  filter/drop_stale_datapoints:
    metrics:
      datapoint:
      - 'flags == FLAG_NO_RECORDED_VALUE'

  transform/drop_unnecessary_attributes:
    error_mode: ignore
    metric_statements:
      - context: resource
        statements:
          - delete_key(attributes, "http.scheme")
          - delete_key(attributes, "net.host.name")
          - delete_key(attributes, "net.host.port")
          - delete_key(attributes, "service.instance.id")
          # prometheus receiver adds these automatically
          # we drop them to make the rest of our pipeline easier to reason about
          # after the collector and metadata are merged, consider using them instead of k8sattributes processor
          - delete_matching_keys(attributes, "k8s.*")

{{- if .Values.sumologic.metrics.dropHistogramBuckets }}
  transform/extract_sum_count_from_histograms:
    error_mode: ignore
    metric_statements:
      - context: metric
        statements:
          - extract_sum_metric(true) where (not IsMatch(name, {{ .Values.sumologic.metrics.allowHistogramRegex | quote }})) and (type == METRIC_DATA_TYPE_HISTOGRAM or type == METRIC_DATA_TYPE_EXPONENTIAL_HISTOGRAM or type == METRIC_DATA_TYPE_SUMMARY)
          - extract_count_metric(true) where (not IsMatch(name, {{ .Values.sumologic.metrics.allowHistogramRegex | quote }})) and (type == METRIC_DATA_TYPE_HISTOGRAM or type == METRIC_DATA_TYPE_EXPONENTIAL_HISTOGRAM or type == METRIC_DATA_TYPE_SUMMARY)
{{- end }}

service:
  telemetry:
    logs:
      level: {{ .Values.metadata.metrics.logLevel }}
    metrics:
      level: {{ .Values.metadata.metrics.metricsLevel }}
      readers:
        - pull:
            exporter:
              prometheus:
                host: ${env:MY_POD_IP}
                port: 8888
                without_type_suffix: true
                without_units: true
                without_scope_info: true
  extensions:
    - health_check
    - pprof
    - file_storage
  pipelines:
    metrics:
      exporters:
{{- if eq .Values.debug.metrics.collector.print true }}
        - debug
{{- end }}
        - otlphttp
      processors:
{{- if eq .Values.sumologic.useExporterBatching false }}
        - batch
{{- end }}
        - filter/drop_stale_datapoints
{{- if .Values.sumologic.metrics.dropHistogramBuckets }}
        - transform/extract_sum_count_from_histograms
{{- end }}
        - transform/drop_unnecessary_attributes
      receivers: [prometheus]
{{- else }}
{{/* Single-layer pipeline: two logical pipelines in one pod connected via forward connector.
     Pipeline 1 (metrics/collector): scraping + collector-stage processors → forward connector
     Pipeline 2 (metrics): enrichment + export (same name/structure as 2-layer metadata pipeline)
     This preserves backward compatibility with customer metadata.metrics.config.merge overrides. */}}
connectors:
  forward: {}
{{- if (eq .Values.sumologic.metrics.sourceType "http") }}
{{ tpl (.Files.Get "conf/metrics/otelcol/connectors.yaml") . | indent 2 }}
{{- end}}

exporters:
{{ tpl (.Files.Get "conf/metrics/otelcol/exporters.yaml") . | indent 2 }}
{{- if and (eq .Values.debug.metrics.collector.print true) (ne .Values.debug.metrics.metadata.print true) }}
  debug:
    verbosity: detailed
{{- end }}

extensions:
  health_check:
    endpoint: {{ template "sumologic.healthEndpoint" . }}
  pprof: {}
{{- if .Values.metadata.persistence.enabled }}
  file_storage:
    directory: /var/lib/storage/otc
    timeout: 10s
    compaction:
      on_rebound: true
      directory: /tmp
{{- end }}

processors:
  # staleness markers may simply indicate targets being moved between collector Pods, so they do more harm than good
  filter/drop_stale_datapoints:
    metrics:
      datapoint:
      - 'flags == FLAG_NO_RECORDED_VALUE'

  transform/drop_unnecessary_attributes:
    error_mode: ignore
    metric_statements:
      - context: resource
        statements:
          - delete_key(attributes, "http.scheme")
          - delete_key(attributes, "net.host.name")
          - delete_key(attributes, "net.host.port")
          - delete_key(attributes, "service.instance.id")
          - delete_matching_keys(attributes, "k8s.*")

{{- if .Values.sumologic.metrics.dropHistogramBuckets }}
  transform/extract_sum_count_from_histograms:
    error_mode: ignore
    metric_statements:
      - context: metric
        statements:
          - extract_sum_metric(true) where (not IsMatch(name, {{ .Values.sumologic.metrics.allowHistogramRegex | quote }})) and (type == METRIC_DATA_TYPE_HISTOGRAM or type == METRIC_DATA_TYPE_EXPONENTIAL_HISTOGRAM or type == METRIC_DATA_TYPE_SUMMARY)
          - extract_count_metric(true) where (not IsMatch(name, {{ .Values.sumologic.metrics.allowHistogramRegex | quote }})) and (type == METRIC_DATA_TYPE_HISTOGRAM or type == METRIC_DATA_TYPE_EXPONENTIAL_HISTOGRAM or type == METRIC_DATA_TYPE_SUMMARY)
{{- end }}

{{ tpl (.Files.Get "conf/metrics/otelcol/processors.yaml") . | indent 2 }}
{{ if .Values.sumologic.metrics.enableDefaultFilters -}}
{{ tpl (.Files.Get "conf/metrics/otelcol/default-filters.yaml") . | indent 2 }}
{{ end -}}

service:
  telemetry:
    logs:
      level: {{ .Values.metadata.metrics.logLevel }}
    metrics:
      level: {{ .Values.metadata.metrics.metricsLevel }}
      readers:
        - pull:
            exporter:
              prometheus:
                host: ${env:MY_POD_IP}
                port: 8888
                without_type_suffix: true
                without_units: true
                without_scope_info: true
  extensions:
    - health_check
    - pprof
{{- if .Values.metadata.persistence.enabled }}
    - file_storage
{{- end }}
  pipelines:
    ## Pipeline 1: Collector stage — scraping + light processing → forward connector
    metrics/collector:
      receivers: [prometheus]
      processors:
        - filter/drop_stale_datapoints
{{- if .Values.sumologic.metrics.dropHistogramBuckets }}
        - transform/extract_sum_count_from_histograms
{{- end }}
        - transform/drop_unnecessary_attributes
      exporters:
        - forward
{{- if eq .Values.debug.metrics.collector.print true }}
        - debug
{{- end }}
    ## Pipeline 2: Metadata stage — enrichment + export (same structure as 2-layer metadata pipeline)
    ## Customer metadata.metrics.config.merge applies to this pipeline.
    metrics:
      exporters:
{{- if (eq .Values.sumologic.metrics.sourceType "http") }}
        - routing/default
{{- else }}
        - sumologic/default
{{- if eq .Values.debug.metrics.metadata.print true }}
        - debug
{{- end }}
{{- if eq (include "sumologic-mock.forward-metrics-metadata" .) "true" }}
        - sumologic/sumologic-mock-default
{{- end }}
{{- end }}
      processors:
        - memory_limiter
        - metricstransform
        - groupbyattrs
        - resource
{{ if .Values.metadata.metrics.useSumoK8sProcessor }}
        - k8s_tagger
{{ else }}
        - k8sattributes
{{ end }}
        - source
        - sumologic
{{- if .Values.sumologic.metrics.otelcol.extraProcessors }}
{{- range $processor := .Values.sumologic.metrics.otelcol.extraProcessors }}
{{ printf "- %s" ( $processor | keys | first ) | indent 8 }}
{{- end }}
{{- end }}
        - resource/remove_k8s_pod_pod_name
        - resource/delete_source_metadata
        - transform/set_name
        - groupbyattrs/group_by_name
        - transform/remove_name
        - filter/drop_unnecessary_metrics
{{- if .Values.sumologic.metrics.enableDefaultFilters }}
        - filter/app_metrics
{{- end }}
{{- if eq .Values.sumologic.useExporterBatching false }}
        - batch
{{- end }}
      receivers:
        - forward
{{- if .Values.metadata.metrics.enableSumoPrometheusRemotewriteReceiver }}
        - telegraf
{{- else if (eq (include "metrics.collector.singleLayerPipeline.enabled" .) "true") }}
        - prometheusremotewrite
{{- end }}
{{- if (eq .Values.sumologic.metrics.sourceType "http") }}
    metrics/sumologic/default:
      receivers:
        - routing/default
      exporters:
        - sumologic/default
{{- if eq .Values.debug.metrics.metadata.print true }}
    metrics/debug:
      receivers:
        - routing/default
      exporters:
        - debug
{{- end }}
{{- if eq (include "sumologic-mock.forward-metrics-metadata" .) "true" }}
    metrics/sumologic/sumologic-mock-default:
      receivers:
        - routing/default
      exporters:
        - sumologic/sumologic-mock-default
    metrics/sumologic/sumologic-mock-http:
      receivers:
        - routing/default
      exporters:
        - sumologic/sumologic-mock-http
{{- end }}
    metrics/apiserver:
      receivers:
        - routing/default
      exporters:
        - sumologic/apiserver
    metrics/control_plane:
      receivers:
        - routing/default
      exporters:
        - sumologic/control_plane
    metrics/controller:
      receivers:
        - routing/default
      exporters:
        - sumologic/controller
    metrics/kubelet:
      receivers:
        - routing/default
      exporters:
        - sumologic/kubelet
    metrics/node:
      receivers:
        - routing/default
      exporters:
        - sumologic/node
    metrics/scheduler:
      receivers:
        - routing/default
      exporters:
        - sumologic/scheduler
    metrics/state:
      receivers:
        - routing/default
      exporters:
        - sumologic/state
{{- end }}
{{- end }}

receivers:
{{- if .Values.sumologic.metrics.collector.otelcol.singleLayerPipeline.enabled }}
{{- if .Values.metadata.metrics.enableSumoPrometheusRemotewriteReceiver }}
  ## Configuration for Sumo Logic Telegraf Receiver (remote write v1 + v2)
  telegraf:
    agent_config: |
      [agent]
        interval = "30s"
        flush_interval = "30s"
        omit_hostname = true
      [[inputs.http_listener_v2]]
        read_timeout = "30s"
        write_timeout = "30s"
        service_address = ":9888"
        data_format = "prometheusremotewrite"
        paths = [
{{ include "metric.endpoints" . | indent 10 }}
        ]
{{- else }}
  ## Configuration for upstream Prometheus Remote Write Receiver (v2 only)
  prometheusremotewrite:
    endpoint: {{ template "sumologic.prometheusremotewrite_endpoint" . }}
    read_timeout: 1m
    write_timeout: 1m
{{- end }}
{{- end }}
  prometheus:
    config:
      global:
        scrape_interval: {{ .Values.sumologic.metrics.collector.otelcol.scrapeInterval }}
      {{- /*
      As of right now, if scrape_configs is empty, it needs to be an empty list, otherwise otel-operator rejects it
      */}}
      scrape_configs: {{- not $scrapeConfigsPresent | ternary " []" "" }}
{{- if $collectorConfig.annotatedPods.enabled }}
        ## scraping metrics basing on annotations:
        ##   - prometheus.io/scrape: true - to scrape metrics from the pod
        ##   - prometheus.io/path: /metrics - path which the metric should be scrape from
        ##   - prometheus.io/port: 9113 - port which the metric should be scrape from
        ## rel: https://github.com/prometheus-operator/kube-prometheus/pull/16#issuecomment-424318647
        - job_name: "pod-annotations"
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
              action: keep
              regex: true
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
              action: replace
              target_label: __metrics_path__
              regex: (.+)
{{- if eq .Values.sumologic.ipv6mode true }}
            - source_labels: [__meta_kubernetes_pod_ip, __meta_kubernetes_pod_annotation_prometheus_io_port]
              action: replace
              regex: (.*);(.*)
              replacement: "[$1]:$2"
              target_label: __address__
{{- else }}
            - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
              action: replace
              regex: ([^:]+)(?::\d+)?;(\d+)
              replacement: $1:$2
              target_label: __address__
{{- end }}
            - source_labels: [__metrics_path__]
              separator: ;
              regex: (.*)
              target_label: endpoint
              replacement: $1
              action: replace
            - source_labels: [__meta_kubernetes_namespace]
              action: replace
              target_label: namespace
            - action: labelmap
              regex: __meta_kubernetes_pod_label_(.+)
            - source_labels: [__meta_kubernetes_pod_name]
              separator: ;
              regex: (.*)
              target_label: pod
              replacement: $1
              action: replace
{{- end }}
{{- if $collectorConfig.kubelet.enabled }}
        ## These scrape configs are for kubelet metrics
        ## Prometheus operator does this by manually maintaining a Service with Endpoints for all Nodes
        ## We don't have that capability, so we need to use a static configuration
        - job_name: kubelet
          scheme: https
          authorization:
            credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
          tls_config:
            ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            insecure_skip_verify: true
          honor_labels: true
          kubernetes_sd_configs:
            - role: node
          metric_relabel_configs:
            - action: keep
              regex: {{ $collectorConfig.kubelet.metricRegex }}
              source_labels: [__name__]
            - action: labeldrop
              regex: id
          relabel_configs:
            - source_labels:
              - __meta_kubernetes_node_name
              target_label: node
            - target_label: endpoint
              replacement: https-metrics
            - source_labels:
              - __metrics_path__
              target_label: metrics_path
              action: replace
            - source_labels:
              - __address__
              target_label: instance
              action: replace
{{- end }}
{{- if $collectorConfig.cAdvisor.enabled }}
        - job_name: cadvisor
          scheme: https
          authorization:
            credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
          tls_config:
            ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            insecure_skip_verify: true
          honor_labels: true
          metrics_path: /metrics/cadvisor
          kubernetes_sd_configs:
            - role: node
          metric_relabel_configs:
            - action: replace
              regex: .*
              replacement: kubelet
              source_labels: [__name__]
              target_label: job
            - action: keep
              regex: {{ $collectorConfig.cAdvisor.metricRegex }}
              source_labels: [__name__]
            ## Drop container metrics with container tag set to an empty string:
            ## these are the pod aggregated container metrics which can be aggregated
            ## in Sumo anyway. There's also some cgroup-specific time series we also
            ## do not need.
            - action: drop
              source_labels: [__name__, container]
              regex: (?:container_cpu_usage_seconds_total|container_memory_working_set_bytes|container_fs_usage_bytes|container_fs_limit_bytes);$
            - action: labelmap
              regex: container_name
              replacement: container
            - action: drop
              source_labels: [container] # partially copied from what operator generates
              regex: POD
            - action: labeldrop
              regex: (id|name)
          relabel_configs:
            - target_label: endpoint
              replacement: https-metrics
            - source_labels:
              - __metrics_path__
              target_label: metrics_path
              action: replace
            - source_labels:
              - __address__
              target_label: instance
              action: replace
{{- end }}
