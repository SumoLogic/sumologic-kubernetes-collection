{{- if and (eq (include "metrics.otelcol.enabled" .) "true") .Values.sumologic.metrics.collector.otelcol.enabled }}
{{- if and .Values.sumologic.metrics.collector.otelcol.singleLayerPipeline.enabled .Values.metadata.metrics.config.override }}
{{- fail "metadata.metrics.config.override cannot be used with singleLayerPipeline.enabled. Use metadata.metrics.config.merge instead, or disable single-layer mode." }}
{{- end }}
{{ $baseConfig := (tpl (.Files.Get "conf/metrics/collector/otelcol/config.yaml") .) | fromYaml }}
{{ $mergeConfig := .Values.sumologic.metrics.collector.otelcol.config.merge }}
{{ $overrideConfig := .Values.sumologic.metrics.collector.otelcol.config.override }}
{{ $finalConfig := "" }}
{{ if $overrideConfig }}
{{ $finalConfig = $overrideConfig }}
{{ else }}
{{ $finalConfig = mergeOverwrite $baseConfig $mergeConfig }}
{{- if .Values.sumologic.metrics.collector.otelcol.singleLayerPipeline.enabled }}
{{/* In single-layer mode, also apply metadata layer config.merge so existing customers'
     metadata-layer customizations carry over to the combined collector pipeline. */}}
{{ $metadataMergeConfig := .Values.metadata.metrics.config.merge }}
{{ if $metadataMergeConfig }}
{{ $finalConfig = mergeOverwrite $finalConfig $metadataMergeConfig }}
{{ end }}
{{- end }}
{{ end }}
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: {{ template "sumologic.metadata.name.metrics.collector.opentelemetrycollector" . }}
  namespace: {{ template "sumologic.namespace"  . }}
  labels:
    {{- include "sumologic.labels.metrics.opentelemetrycollector" . | nindent 4 }}
    {{- include "sumologic.labels.common" . | nindent 4 }}
    {{- include "sumologic.label.scrape" . | nindent 4 }}
    {{- if .Values.sumologic.podLabels }}
    {{ toYaml .Values.sumologic.podLabels | nindent 4 }}
    {{- end }}
    {{- if .Values.sumologic.metrics.collector.otelcol.podLabels }}
    {{ toYaml .Values.sumologic.metrics.collector.otelcol.podLabels | nindent 4 }}
    {{- end }}
spec:
  image: {{ template "sumologic.metrics.collector.image" . }}
  mode: statefulset
  replicas: {{ .Values.sumologic.metrics.collector.otelcol.replicaCount }}
  serviceAccount: {{ template "sumologic.metadata.name.metrics.collector.serviceaccount" . }}
  managementState: {{ template "sumologic.metrics.collector.otelcol.managementState" . }}
  upgradeStrategy: {{ template "sumologic.metrics.collector.otelcol.upgradeStrategy" . }}
  targetAllocator:
{{- if .Values.sumologic.metrics.collector.otelcol.allocationStrategy }}
    allocationStrategy: {{ .Values.sumologic.metrics.collector.otelcol.allocationStrategy }}
{{- end }}
    enabled: true
    filterStrategy: relabel-config
    prometheusCR:
      enabled: true
      scrapeInterval: {{ .Values.sumologic.metrics.collector.otelcol.scrapeInterval }}
{{- if not (empty (include "metrics.collector.otelcol.serviceMonitorSelector" .)) }}
      serviceMonitorSelector:
        matchLabels:
{{ include "metrics.collector.otelcol.serviceMonitorSelector" . | indent 10 }}
{{ else }}
      serviceMonitorSelector:
        matchLabels:
          release: {{ .Release.Name }}
{{- end }}
{{- if not (empty (include "metrics.collector.otelcol.podMonitorSelector" .)) }}
      podMonitorSelector:
        matchLabels:
{{ include "metrics.collector.otelcol.podMonitorSelector" . | indent 10 }}
{{ else }}
      podMonitorSelector:
        matchLabels:
          release: {{ .Release.Name }}
{{- end }}
    serviceAccount: {{ template "sumologic.metadata.name.metrics.targetallocator.serviceaccount" . }}
{{- if not (empty (include "metrics.collector.otelcol.nodeSelector" .)) }}
    nodeSelector:
{{ include "metrics.collector.otelcol.nodeSelector" . | indent 6 }}
{{- end }}
    resources:
      {{ .Values.sumologic.metrics.collector.otelcol.targetAllocator.resources | toYaml | nindent 6 }}
{{- if not (empty (include "metrics.collector.otelcol.tolerations" .)) }}
    tolerations:
{{ include "metrics.collector.otelcol.tolerations" . | indent 6 }}
{{- end }}
{{- if not (empty (include "metrics.collector.otelcol.affinity" .)) }}
    affinity:
{{ include "metrics.collector.otelcol.affinity" . | indent 6 }}
{{- end }}
{{- if not (empty (include "metrics.collector.otelcol.nodeSelector" .)) }}
  nodeSelector:
{{ include "metrics.collector.otelcol.nodeSelector" . | indent 4 }}
{{- end }}
{{- if not (empty (include "metrics.collector.otelcol.tolerations" .)) }}
  tolerations:
{{ include "metrics.collector.otelcol.tolerations" . | indent 6 }}
{{- end }}
{{- if not (empty (include "metrics.collector.otelcol.affinity" .)) }}
  affinity:
{{ include "metrics.collector.otelcol.affinity" . | indent 6 }}
{{- end }}
{{- if .Values.sumologic.metrics.collector.otelcol.priorityClassName }}
  priorityClassName: {{ .Values.sumologic.metrics.collector.otelcol.priorityClassName | quote }}
{{- end }}
{{- if eq (include "metrics.collector.autoscaling.enabled" .) "true" }}
  autoscaler:
    maxReplicas: {{ .Values.sumologic.metrics.collector.otelcol.autoscaling.maxReplicas }}
{{- if eq (include "metrics.collector.singleLayerPipeline.enabled" .) "true" }}
    minReplicas: 3
{{- else }}
    minReplicas: {{ .Values.sumologic.metrics.collector.otelcol.autoscaling.minReplicas }}
{{- end }}
    targetCPUUtilization: {{ .Values.sumologic.metrics.collector.otelcol.autoscaling.targetCPUUtilizationPercentage }}
{{- if .Values.sumologic.metrics.collector.otelcol.autoscaling.targetMemoryUtilizationPercentage }}
    targetMemoryUtilization: {{ .Values.sumologic.metrics.collector.otelcol.autoscaling.targetMemoryUtilizationPercentage }}
{{- end }}
{{- if .Values.sumologic.metrics.collector.otelcol.autoscaling.behavior }}
    behavior:
{{ toYaml .Values.sumologic.metrics.collector.otelcol.autoscaling.behavior | nindent 6 }}
{{- end }}
{{- end }}
  env:
{{- if not .Values.sumologic.metrics.collector.otelcol.singleLayerPipeline.enabled }}
  - name: METADATA_METRICS_SVC
    valueFrom:
      configMapKeyRef:
        name: sumologic-configmap
        key: metadataMetrics
{{- else }}
{{- $ctx := .Values -}}
{{- include "kubernetes.sources.envs" (dict "Context" $ctx "Type" "metrics") | nindent 2 -}}
{{- include "proxy-env-variables" . | nindent 2 -}}
{{- if .Values.metadata.metrics.statefulset.extraEnvVars }}
{{ toYaml .Values.metadata.metrics.statefulset.extraEnvVars | nindent 2 }}
{{- end }}
{{- end }}
  - name: NAMESPACE
    valueFrom:
      fieldRef:
        fieldPath: metadata.namespace
  - name: MY_POD_IP
    valueFrom:
      fieldRef:
        apiVersion: v1
        fieldPath: status.podIP
  podAnnotations:
    ## The operator adds this annotation by default, but we use our own ServiceMonitor
    prometheus.io/scrape: "false"
{{- if .Values.sumologic.podAnnotations -}}
    {{ toYaml .Values.sumologic.podAnnotations | nindent 4 }}
{{- end }}
{{- if .Values.sumologic.metrics.collector.otelcol.podAnnotations -}}
    {{ toYaml .Values.sumologic.metrics.collector.otelcol.podAnnotations | nindent 4 }}
{{- end }}
  podSecurityContext:
    {{ .Values.sumologic.metrics.collector.otelcol.securityContext | toYaml | nindent 4 }}
  ports:
  - name: pprof
    port: 1777
{{- if .Values.sumologic.metrics.collector.otelcol.singleLayerPipeline.enabled }}
  - name: metrics-rw
    port: 9888
{{- end }}
  resources:
    {{ .Values.sumologic.metrics.collector.otelcol.resources | toYaml | nindent 4 }}
  volumes:
  - name: tmp
    emptyDir: {}
{{- if not (and .Values.sumologic.metrics.collector.otelcol.singleLayerPipeline.enabled .Values.metadata.persistence.enabled) }}
  - name: file-storage
    emptyDir: {}
{{- end }}
{{- if and .Values.sumologic.metrics.collector.otelcol.singleLayerPipeline.enabled .Values.metadata.metrics.statefulset.extraVolumes }}
{{ toYaml .Values.metadata.metrics.statefulset.extraVolumes | nindent 2 }}
{{- end }}
  volumeMounts:
  - name: tmp
    mountPath: /tmp
  - name: file-storage
    mountPath: /var/lib/storage/otc
{{- if and .Values.sumologic.metrics.collector.otelcol.singleLayerPipeline.enabled .Values.metadata.metrics.statefulset.extraVolumeMounts }}
{{ toYaml .Values.metadata.metrics.statefulset.extraVolumeMounts | nindent 2 }}
{{- end }}
{{- if and .Values.sumologic.metrics.collector.otelcol.singleLayerPipeline.enabled .Values.metadata.persistence.enabled }}
  volumeClaimTemplates:
  - metadata:
      name: file-storage
{{- if .Values.metadata.persistence.pvcLabels }}
      labels:
{{ toYaml .Values.metadata.persistence.pvcLabels | indent 8 }}
{{- end }}
    spec:
      accessModes: [{{ .Values.metadata.persistence.accessMode }}]
{{- if .Values.metadata.persistence.storageClass }}
      storageClassName: {{ .Values.metadata.persistence.storageClass | quote }}
{{- end }}
      resources:
        requests:
          storage: {{ .Values.metadata.persistence.size }}
{{- end }}
  config:
{{- $finalConfig | toYaml | nindent 4 }}
{{- end }}
